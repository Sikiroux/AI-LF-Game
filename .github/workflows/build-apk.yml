name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build le web app (chemins relatifs pour l'APK)
        run: npm run build:apk

      - name: Copier les assets web dans le projet Android
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Build l'APK debug (installable directement, non signée)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: liberte-financiere-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
